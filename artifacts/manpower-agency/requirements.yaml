packages:
  "framer-motion": "For page transitions and interactive element animations"
  "recharts": "For admin dashboard statistics and earnings charts"
  "date-fns": "For formatting shift times and event dates professionally"
  "react-hook-form": "For robust form state management"
  "@hookform/resolvers": "For Zod schema validation in forms"
